name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ vars.PRODUCTION_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/finmate_deploy_key
          chmod 600 ~/.ssh/finmate_deploy_key
          ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/finmate_deploy_key "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" <<'EOF'
          set -euo pipefail
          cd "${FINMATE_DEPLOY_DIR:-/opt/finmateuz}"
          git fetch origin main
          git reset --hard origin/main
          docker compose -f docker-compose.prod.yml pull || true
          docker compose -f docker-compose.prod.yml up --build -d
          docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
          docker compose -f docker-compose.prod.yml ps
          EOF
