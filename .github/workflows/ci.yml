name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install ".[test]"
      - run: python -m pytest -q

  bot:
    name: Bot tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install ".[test]"
      - run: python -m pytest -q

  web:
    name: Web lint, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    name: Docker config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - name: Validate production compose
        env:
          ENVIRONMENT: production
          APP_NAME: FinMate UZ API
          API_PORT: "8000"
          WEB_PORT: "3000"
          POSTGRES_DB: finmate
          POSTGRES_USER: finmate
          POSTGRES_PASSWORD: CHANGE_ME_STRONG_POSTGRES_PASSWORD
          JWT_SECRET_KEY: CHANGE_ME_LONG_RANDOM_SECRET
          CORS_ORIGINS: '["https://app.finmates.app","https://finmates.app","https://www.finmates.app"]'
          BOT_API_TOKEN: CHANGE_ME_STRONG_INTERNAL_BOT_TOKEN
          TELEGRAM_BOT_TOKEN: CHANGE_ME_REAL_BOTFATHER_TOKEN
          API_BASE_URL: https://api.finmates.app/api/v1
          NEXT_PUBLIC_API_URL: https://api.finmates.app/api/v1
        run: docker compose -f docker-compose.prod.yml config
